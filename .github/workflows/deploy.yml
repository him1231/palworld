name: Update data & deploy to GitHub Pages

on:
  schedule:
    - cron: '0 21 * * *' # daily 21:00 UTC = 05:00 HKT
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # keep downloaded icons / full-res map between runs (polite to upstreams)
      - uses: actions/cache@v4
        with:
          path: |
            public/img
            .cache
          key: assets-v1-${{ github.run_id }}
          restore-keys: assets-v1-

      - name: Update game data from upstream sources
        run: node scripts/update-data.mjs

      - name: Build site
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm run build
          cp dist/index.html dist/404.html # SPA fallback for direct deep links

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
